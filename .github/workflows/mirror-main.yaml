name: Sync Main to Factory

on:
  push:
    branches: [ "main" ]

jobs:
  sync-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Gitea
        env:
           GITEA_USER: ${{ secrets.GITEA_USER }}
           GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
           GITEA_HOST: ${{ secrets.GITEA_HOST }}
           TARGET: "https://${{ secrets.GITEA_HOST }}/${{ secrets.GITEA_USER }}/safespace.git"
        run: |
          # Secure Credential Setup
          git config --global credential.helper store
          echo "https://$GITEA_USER:$GITEA_TOKEN@$GITEA_HOST" > ~/.git-credentials

          echo "🚀 Syncing..."
          git push -f "$TARGET" main
