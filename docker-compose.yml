version: "3.8"

services:
  # --- FRONTEND (React + Nginx) ---
  frontend:
    build: 
      context: ./frontend
    container_name: safespace-frontend
    restart: always
    ports:
      - "3000:80"  # Expose Nginx on Host Port 3000
    depends_on:
      - backend
    networks:
      - invisible-net

  # --- BACKEND (FastAPI + Phase 18) ---
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: safespace-backend
    restart: always
    ports:
      - "8000:8000" # Expose API directly (optional, for Cloudflare Tunnel)
    volumes:
      - ./models:/app/models
      - ./uploads:/app/uploads
      - ./backend:/app/backend
      - ./invisible_core:/app/invisible_core
      - ./backend:/app/backend
      - ./.cache:/root/.cache  # Persist HuggingFace/Torch model downloads
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - LIGHTNING_API_KEY=${LIGHTNING_API_KEY}
      - LIGHTNING_STUDIO_NAME=gpu-1
      - LIGHTNING_TEAM=ahmedgamal-8mg0l
      - LIGHTNING_PROJECT=deploy-model-project
      - LIGHTNING_MACHINE=${LIGHTNING_MACHINE:-L4}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - invisible-net

  # --- LOCAL UI (Streamlit) ---
  local-ui:
    build:
      context: .
      dockerfile: Dockerfile  # Root Dockerfile runs Streamlit
    container_name: safespace-ui
    restart: always
    ports:
      - "8501:8501"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./invisible_core:/app/invisible_core
      - ./app_interface:/app/app_interface
      - ./.cache:/root/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - GRADIO_SERVER_NAME=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - invisible-net

  # --- GITEA SERVER (Existing) ---
  gitea-server:
    image: gitea/gitea:latest
    container_name: gitea-server
    restart: always
    environment:
      - USER_UID=1000
      - USER_GID=1000
    networks:
      - invisible-net
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3003:3000"  # Changed to 3003 to avoid conflict if any
      - "2222:22"

networks:
  invisible-net:
    driver: bridge

volumes:
  gitea_data:
